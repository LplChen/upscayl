name: Build for Windows

on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # 消除 Node.js 20 报错，系统会提示已强制使用 Node 24 (属于正常现象)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Modules and Build
        run: |
          npm install
          npm run dist:win

      # 获取最新 Release 的 tag 标签名
      - name: Get Latest Release
        id: get_latest_release
        uses: actions/github-script@v7
        with:
          script: |
            const latestRelease = await github.rest.repos.getLatestRelease({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            // 修复：将获取到的 tag_name 输出给下一步使用
            core.setOutput('tag_name', latestRelease.data.tag_name);

      # 修正：更换为原生支持多行通配符的 softprops 插件，并精准推送到刚才获取的 Release 标签中
      - name: Upload Assets to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_latest_release.outputs.tag_name }}
          files: |
            dist/*.blockmap
            dist/*.zip
            dist/*.exe
            dist/*.yml

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.blockmap
            dist/*.zip
            dist/*.exe
            dist/*.yml
