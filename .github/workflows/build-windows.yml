name: Build for Windows

on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # 消除 Node.js 20 警告，强制使用 Node.js 24
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Modules and Build
        run: |
          npm install
          npm run dist:win

      # 获取最新的 Release（手动创建一次后，这里就不会再报 404 错误了）
      - name: Get Latest Release
        id: get_latest_release
        uses: actions/github-script@v7
        with:
          script: |
            const latestRelease = await github.rest.repos.getLatestRelease({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            core.setOutput('release_id', latestRelease.data.id);

      # 将打包好的资源上传到刚才获取到的 Release 中
      - name: Upload Assets to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file_glob: true # 关键修复：开启通配符支持，否则上传多个带 * 的文件会失败
          file: |
            dist/*.blockmap
            dist/*.zip
            dist/*.exe
            dist/*.yml

      # 同时也生成 Artifact 供直接下载
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.blockmap
            dist/*.zip
            dist/*.exe
            dist/*.yml
